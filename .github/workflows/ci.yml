name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        # sentence-transformers (and its torch dependency) is excluded in CI to
        # keep the job fast; the service then uses its deterministic offline
        # embedding fallback (rag/embeddings.py), which is exactly what the
        # tests are written against. No secrets, no model weights, no network
        # needed at test time.
        run: |
          grep -v '^sentence-transformers' requirements-serve.txt > /tmp/req-ci.txt
          pip install -r /tmp/req-ci.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Unit and API tests (offline, stub classifier + mock LLM)
        run: pytest -v

      - name: Behavioral suite — smoke mode (HateCheck-XR pipeline check)
        # MODEL_DIR is unset, so this verifies the eval pipeline end-to-end and
        # publishes the report artifact. Quality thresholds are enforced only
        # when a real model is provided via MODEL_DIR (see evals/README note).
        run: python -m evals.run_behavioral_suite --out-dir evals/reports

      - name: CoT strategy evaluation — smoke (Module A)
        # direct vs cot vs self-consistency + faithfulness metrics on the masked
        # probe set, with the deterministic MockLLM. Real numbers need LLM_BASE_URL.
        env:
          CHROMA_DIR: ${{ runner.temp }}/chroma
        run: python -m evals.run_cot_eval --out-dir evals/reports

      - name: Red-team harness — smoke, gated (Module B)
        # ASR before/after the defenses; --gate fails the build if the
        # after-defense ASR regresses past redteam/thresholds.json (deterministic).
        env:
          CHROMA_DIR: ${{ runner.temp }}/chroma
        run: python -m redteam.run_redteam --gate --out-dir redteam/reports

      - name: Upload behavioral report
        uses: actions/upload-artifact@v4
        with:
          name: behavioral-report
          path: evals/reports/

      - name: Upload red-team report
        uses: actions/upload-artifact@v4
        with:
          name: redteam-report
          path: redteam/reports/
