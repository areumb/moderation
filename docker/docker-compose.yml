# Optional compose setup. The service is self-contained (embedded Chroma,
# mock LLM), so `docker compose up` works with no other services.
# Uncomment the ollama block to adjudicate with a real local LLM.
services:
  moderation:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
